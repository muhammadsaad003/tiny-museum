services:
  tiny-museum:
    build: .
    container_name: tiny-museum
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/tiny_museum.db
    volumes:
      - tiny_museum_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  tiny_museum_data:
